<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthSync AI | Smart Symptom Checker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --secondary: #64748b;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --accent: #dbeafe;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --radius-lg: 1.25rem;
            --radius-md: 0.75rem;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 1.25rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--primary);
            letter-spacing: -0.025em;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary), #60a5fa);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        main {
            flex: 1;
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
            background-color: var(--card-bg);
            box-shadow: var(--shadow);
            margin-top: 1rem;
            margin-bottom: 1rem;
            border-radius: var(--radius-lg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .chat-container {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 80%;
            padding: 1rem 1.25rem;
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            position: relative;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bot-message {
            align-self: flex-start;
            background-color: var(--accent);
            color: var(--text);
            border-bottom-left-radius: 4px;
        }

        .input-area {
            padding: 1.5rem 2rem;
            border-top: 1px solid var(--border);
            background-color: var(--bg);
            display: flex;
            gap: 1rem;
        }

        input {
            flex: 1;
            padding: 0.875rem 1.25rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            outline: none;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            background-color: white;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        button.send-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0 1.5rem;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button.send-btn:hover {
            background-color: var(--primary-hover);
        }

        button.send-btn:active {
            transform: scale(0.98);
        }

        .followup-btn {
            display: block;
            width: 100%;
            text-align: left;
            background: white;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 0.75rem 1rem;
            margin-top: 0.5rem;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .followup-btn:hover {
            background: var(--primary);
            color: white;
        }

        .prediction-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 1.25rem;
            margin-top: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .prediction-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .disease-name {
            font-weight: 700;
            color: var(--primary);
            font-size: 1.1rem;
            text-transform: capitalize;
        }

        .probability-badge {
            font-size: 0.75rem;
            font-weight: 600;
            background: var(--accent);
            color: var(--primary);
            padding: 0.25rem 0.625rem;
            border-radius: 9999px;
        }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 0.75rem;
        }

        .detail-item {
            font-size: 0.85rem;
        }

        .detail-label {
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
            display: block;
        }

        .typing {
            display: flex;
            gap: 4px;
            padding: 0.5rem;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--secondary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .med-tag {
            background: #f1f5f9;
            color: #475569;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            display: inline-block;
            margin: 2px;
            border: 1px solid #e2e8f0;
        }

        @media (max-width: 768px) {
            main { margin: 0; height: 100%; border-radius: 0; }
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-icon">H</div>
            <span>HealthSync AI</span>
        </div>
        <div style="font-size: 0.85rem; color: var(--text-muted);">Conversational Diagnosis</div>
    </header>

    <main>
        <div class="chat-container" id="chat">
            <div class="message bot-message">
                Hello! I am HealthSync AI. Please describe how you're feeling. For example, "I have a headache and feel nauseous."
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Describe symptoms..." autocomplete="off">
            <button id="sendBtn" class="send-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </main>

    <script>
        const chat = document.getElementById('chat');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        
        let symptomHistory = [];

        function appendMessage(role, content, isHtml = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}-message`;
            if (isHtml) {
                msgDiv.innerHTML = content;
            } else {
                msgDiv.textContent = content;
            }
            chat.appendChild(msgDiv);
            chat.scrollTop = chat.scrollHeight;
            return msgDiv;
        }

        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot-message typing-indicator';
            typingDiv.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
            chat.appendChild(typingDiv);
            chat.scrollTop = chat.scrollHeight;
            return typingDiv;
        }

        async function processInput(text) {
            if (!text) return;

            // Simple context accumulation
            symptomHistory.push(text);
            const fullQuery = symptomHistory.join(". ");

            userInput.disabled = true;
            sendBtn.disabled = true;

            const typing = showTyping();

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symptoms: fullQuery })
                });

                const data = await response.json();
                typing.remove();

                if (data.emergency) {
                    appendMessage('bot', `<div style="color:var(--error); font-weight:bold;">Emergency Alert!</div><p>${data.message}</p>`, true);
                    return;
                }

                if (data.predictions && data.predictions.length > 0) {
                    let html = `<p>I've analyzed your symptoms. Here are the most likely conditions:</p>`;
                    
                    data.predictions.slice(0, 2).forEach(pred => {
                        const meds = pred.medications ? pred.medications.split(';').map(m => `<span class="med-tag">${m.trim()}</span>`).join('') : 'None reported';
                        
                        html += `
                            <div class="prediction-card">
                                <div class="prediction-header">
                                    <span class="disease-name">${pred.disease}</span>
                                    <span class="probability-badge">${pred.probability}% Match</span>
                                </div>
                                <div class="details-grid">
                                    <div class="detail-item">
                                        <span class="detail-label">Care Level</span>
                                        ${pred.doctor || 'General physician'}
                                    </div>
                                    <div class="detail-item">
                                        <span class="detail-label">Potential Treatments</span>
                                        <div style="margin-top:4px">${meds}</div>
                                    </div>
                                </div>
                            </div>
                        `;
                    });

                    if (data.follow_up_questions && data.follow_up_questions.length > 0) {
                        html += `<p style="margin-top: 15px; font-weight: 600;">To help me narrow this down, could you answer these?</p>`;
                        data.follow_up_questions.slice(0, 3).forEach(q => {
                            const btnId = 'btn-' + Math.random().toString(36).substr(2, 9);
                            html += `<button class="followup-btn" onclick="sendFollowup('${q.replace(/'/g, "\\'")}')">${q}</button>`;
                        });
                    }

                    appendMessage('bot', html, true);
                } else {
                    appendMessage('bot', "I couldn't identify specific conditions. Could you tell me more about how you feel?");
                }

            } catch (err) {
                typing.remove();
                appendMessage('bot', "I'm having trouble connecting. Please try again.");
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        window.sendFollowup = (text) => {
            appendMessage('user', text);
            processInput(text);
        };

        sendBtn.addEventListener('click', () => {
            const text = userInput.value.trim();
            if (text) {
                appendMessage('user', text);
                processInput(text);
                userInput.value = '';
            }
        });

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const text = userInput.value.trim();
                if (text) {
                    appendMessage('user', text);
                    processInput(text);
                    userInput.value = '';
                }
            }
        });
    </script>
</body>
</html>
