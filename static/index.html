<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthSync AI | Smart Symptom Checker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --secondary: #64748b;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --accent: #dbeafe;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --radius-lg: 1.25rem;
            --radius-md: 0.75rem;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 1.25rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--primary);
            letter-spacing: -0.025em;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary), #60a5fa);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        main {
            flex: 1;
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
            background-color: var(--card-bg);
            box-shadow: var(--shadow);
            margin-top: 2rem;
            margin-bottom: 2rem;
            border-radius: var(--radius-lg);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .chat-container {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 80%;
            padding: 1rem 1.25rem;
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            position: relative;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
            background-color: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bot-message {
            align-self: flex-start;
            background-color: var(--accent);
            color: var(--text);
            border-bottom-left-radius: 4px;
        }

        .input-area {
            padding: 1.5rem 2rem;
            border-top: 1px solid var(--border);
            background-color: var(--bg);
            display: flex;
            gap: 1rem;
        }

        input {
            flex: 1;
            padding: 0.875rem 1.25rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            outline: none;
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            background-color: white;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0 1.5rem;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: var(--secondary);
            cursor: not-allowed;
            opacity: 0.7;
        }

        .prediction-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 1.25rem;
            margin-top: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .prediction-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .disease-name {
            font-weight: 700;
            color: var(--primary);
            font-size: 1.1rem;
            text-transform: capitalize;
        }

        .probability-badge {
            font-size: 0.75rem;
            font-weight: 600;
            background: var(--accent);
            color: var(--primary);
            padding: 0.25rem 0.625rem;
            border-radius: 9999px;
        }

        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-top: 0.75rem;
        }

        .detail-item {
            font-size: 0.85rem;
        }

        .detail-label {
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
            display: block;
        }

        .emergency-banner {
            background-color: #fee2e2;
            color: #b91c1c;
            padding: 1rem;
            border-radius: var(--radius-md);
            border: 1px solid #fecaca;
            margin-top: 0.5rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .typing {
            display: flex;
            gap: 4px;
            padding: 0.5rem;
            align-items: center;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--secondary);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        @media (max-width: 768px) {
            main {
                margin: 0;
                height: 100%;
                border-radius: 0;
            }
            .chat-container {
                padding: 1rem;
            }
            .message {
                max-width: 90%;
            }
            .details-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-icon">H</div>
            <span>HealthSync AI</span>
        </div>
        <div style="font-size: 0.85rem; color: var(--text-muted);">Secure & Private Analysis</div>
    </header>

    <main>
        <div class="chat-container" id="chat">
            <div class="message bot-message">
                Hello! I am HealthSync AI. Please describe your symptoms (e.g., "I have a high fever and headache since 2 days"). I'll analyze them for you.
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type symptoms here..." autocomplete="off">
            <button id="sendBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </main>

    <script>
        const chat = document.getElementById('chat');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        function appendMessage(role, content, isHtml = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}-message`;
            if (isHtml) {
                msgDiv.innerHTML = content;
            } else {
                msgDiv.textContent = content;
            }
            chat.appendChild(msgDiv);
            chat.scrollTop = chat.scrollHeight;
            return msgDiv;
        }

        function showTyping() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message bot-message typing-indicator';
            typingDiv.innerHTML = '<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
            chat.appendChild(typingDiv);
            chat.scrollTop = chat.scrollHeight;
            return typingDiv;
        }

        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;

            appendMessage('user', text);
            const typing = showTyping();

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ symptoms: text })
                });

                const data = await response.json();
                typing.remove();

                if (data.emergency) {
                    appendMessage('bot', `
                        <div class="emergency-banner">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                            EMERGENCY DETECTED
                        </div>
                        <p style="margin-top: 10px">${data.message}</p>
                    `, true);
                    return;
                }

                if (data.predictions && data.predictions.length > 0) {
                    let html = `<p>Based on your symptoms (${data.detected_symptoms.join(', ')}), here is what I found:</p>`;
                    
                    data.predictions.slice(0, 3).forEach(pred => {
                        html += `
                            <div class="prediction-card">
                                <div class="prediction-header">
                                    <span class="disease-name">${pred.disease}</span>
                                    <span class="probability-badge">${pred.probability}% Match</span>
                                </div>
                                <div class="details-grid">
                                    <div class="detail-item">
                                        <span class="detail-label">Recommended Care</span>
                                        ${pred.doctor || 'General Physician'}
                                    </div>
                                    <div class="detail-item">
                                        <span class="detail-label">Treatment</span>
                                        ${pred.medications || 'Rest & Fluids'}
                                    </div>
                                </div>
                            </div>
                        `;
                    });

                    if (data.follow_up_questions && data.follow_up_questions.length > 0) {
                        html += `<p style="margin-top: 15px; font-weight: 600;">To be more certain, please consider:</p>`;
                        html += `<ul style="margin-left: 20px; font-size: 0.9rem;">${data.follow_up_questions.map(q => `<li>${q}</li>`).join('')}</ul>`;
                    }

                    appendMessage('bot', html, true);
                } else {
                    appendMessage('bot', "I couldn't identify specific conditions. Please try describing your symptoms differently or consult a doctor.");
                }

            } catch (err) {
                typing.remove();
                appendMessage('bot', "Sorry, I encountered an error. Please try again later.");
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });
    </script>
</body>
</html>
